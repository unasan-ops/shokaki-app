function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

async function getRoadDistances(origin, hospitals) {
  const coords = [origin.lng+','+origin.lat]
    .concat(hospitals.map(h => h.lng+','+h.lat)).join(';');
  const res = await fetch('https://router.project-osrm.org/table/v1/driving/'+coords+'?sources=0&annotations=distance');
  const data = await res.json();
  if (data.code !== 'Ok') throw new Error('OSRM: '+data.code);
  return data.distances[0].slice(1).map(d => d !== null ? d/1000 : null);
}

async function getCoords(zipcode, baseAddress, addrDetail) {
  if (addrDetail) {
    const fullAddr = baseAddress + addrDetail;
    const res = await fetch('https://msearch.gsi.go.jp/address-search/AddressSearch?q='+encodeURIComponent(fullAddr));
    const data = await res.json();
    if (Array.isArray(data) && data[0] && data[0].geometry)
      return { lat: data[0].geometry.coordinates[1], lng: data[0].geometry.coordinates[0], resolvedAddress: data[0].properties.title };
  }
  const res = await fetch('https://geoapi.heartrails.com/api/json?method=searchByPostal&postal='+zipcode);
  const data = await res.json();
  if (data.response && data.response.location && data.response.location.length) {
    const loc = data.response.location[0];
    return { lat: parseFloat(loc.y), lng: parseFloat(loc.x), resolvedAddress: loc.prefecture+loc.city+loc.town };
  }
  throw new Error('位置情報を取得できませんでした（郵便番号: '+zipcode+'）');
}

async function doSearch() {
  const townEl = document.getElementById('townDisplay');
  const baseAddress = townEl.textContent.trim();
  const addrDetail = document.getElementById('addrInput').value.trim();
  const statusEl = document.getElementById('statusMsg');
  const resultsEl = document.getElementById('results');
  const btn = document.getElementById('btnSearch');

  if (!baseAddress || townEl.classList.contains('loading') || townEl.classList.contains('error')) {
    statusEl.textContent = '郵便番号を入力して地名を確認してください。';
    statusEl.className = 'status error'; return;
  }
  btn.disabled = true;
  statusEl.className = 'status';
  statusEl.textContent = '位置情報を取得中...';
  resultsEl.innerHTML = '';
  document.getElementById('mapContainer').style.display = 'none';

  let coords;
  const zipcode = townEl.dataset.zip || '';
  try { coords = await getCoords(zipcode, baseAddress, addrDetail); }
  catch (e) { statusEl.textContent = e.message; statusEl.className = 'status error'; btn.disabled = false; return; }

  statusEl.textContent = '検索中（基準住所: '+coords.resolvedAddress+'）';

  const needUpper = document.getElementById('chk_upper').checked;
  const needLower = document.getElementById('chk_lower').checked;
  const needUs    = document.getElementById('chk_us').checked;
  const needCt    = document.getElementById('chk_ct').checked;
  const needMri   = document.getElementById('chk_mri').checked;
  const needLiver = document.getElementById('chk_liver').checked;

  const filtered = HOSPITALS.filter(h => {
    if (!h.lat || !h.lng) return false;
    if (needUpper && !h.upperEndoscopy) return false;
    if (needLower && !h.lowerEndoscopy) return false;
    if (needUs    && !h.us) return false;
    if (needCt    && !h.ct) return false;
    if (needMri   && !h.mri) return false;
    if (needLiver && !h.liverCenter) return false;
    return true;
  });

  const ADJACENT_KM = 2.0;
  const townMatch = baseAddress.match(/[市区町村](.+)/);
  const patientTown = townMatch ? townMatch[1].replace(/^大字/, '') : '';

  const withStraight = filtered.map(h => {
    const d = haversine(coords.lat, coords.lng, h.lat, h.lng);
    const same = patientTown.length >= 2 && h.address.includes(patientTown);
    return { ...h, straightDist: d, sameTown: same, adjacentTown: !same && d <= ADJACENT_KM };
  });
  withStraight.sort((a, b) => a.straightDist - b.straightDist);

  const priority = withStraight.filter(h => h.sameTown || h.adjacentTown);
  const others   = withStraight.filter(h => !h.sameTown && !h.adjacentTown);
  const candidates = [...priority, ...others.slice(0, Math.max(20 - priority.length, 6))];

  let sortedResults;
  try {
    statusEl.textContent = '経路距離を計算中...';
    const roadKms = await getRoadDistances(coords, candidates);
    sortedResults = candidates.map((h, i) => ({
      ...h,
      distance: roadKms[i] !== null ? roadKms[i] : h.straightDist,
      isRoad: roadKms[i] !== null
    }));
  } catch {
    sortedResults = candidates.map(h => ({ ...h, distance: h.straightDist, isRoad: false }));
  }

  sortedResults.sort((a, b) => {
    const pa = a.sameTown ? 0 : a.adjacentTown ? 1 : 2;
    const pb = b.sameTown ? 0 : b.adjacentTown ? 1 : 2;
    if (pa !== pb) return pa - pb;
    return a.distance - b.distance;
  });
  const top6 = sortedResults.slice(0, 6);

  statusEl.textContent = '';
  btn.disabled = false;

  if (top6.length === 0) {
    resultsEl.innerHTML = '<div class="card"><div class="no-result">条件に合致する医療機関が見つかりませんでした。<br>検索条件を変更してお試しください。</div></div>';
    return;
  }

  const rankClass = ['rank-1','rank-2','rank-3','','',''];
  const featDefs = [
    {key:'upperEndoscopy', label:'上部内視鏡'},
    {key:'lowerEndoscopy', label:'下部内視鏡'},
    {key:'us',            label:'US'},
    {key:'ct',            label:'CT'},
    {key:'mri',           label:'MRI'},
    {key:'liverCenter',   label:'肝疾患センター'}
  ];
  const selectedKeys = [];
  if (needUpper) selectedKeys.push('upperEndoscopy');
  if (needLower) selectedKeys.push('lowerEndoscopy');
  if (needUs)    selectedKeys.push('us');
  if (needCt)    selectedKeys.push('ct');
  if (needMri)   selectedKeys.push('mri');
  if (needLiver) selectedKeys.push('liverCenter');
  const showFeats = selectedKeys.length > 0 ? featDefs.filter(f => selectedKeys.includes(f.key)) : featDefs;

  const mapUrl = 'https://www.google.com/maps?q='+coords.lat+','+coords.lng;
  let html = '<div class="base-point"><span class="bp-label">検索基準地点:</span><span class="bp-addr">'+esc(coords.resolvedAddress)+'</span><a class="bp-link" href="'+mapUrl+'" target="_blank" rel="noopener">地図で確認 ↗</a></div>';
  html += '<div class="result-count">検索結果: '+filtered.length+'件中、距離の近い'+top6.length+'件を表示</div>';

  top6.forEach((h, i) => {
    const distNum = h.distance < 1 ? Math.round(h.distance*1000)+'m' : h.distance.toFixed(1)+'km';
    const dist = (h.isRoad ? '🚗 ' : '📏 ') + distNum;
    const townBadge = h.sameTown
      ? '<span style="font-size:0.7rem;background:#fefcbf;color:#744210;border:1px solid #f6e05e;padding:1px 7px;border-radius:10px;margin-left:6px;vertical-align:middle;">同地区</span>'
      : h.adjacentTown
        ? '<span style="font-size:0.7rem;background:#e9f5e9;color:#276227;border:1px solid #9ae6b4;padding:1px 7px;border-radius:10px;margin-left:6px;vertical-align:middle;">隣接地区</span>'
        : '';
    const featsHtml = showFeats.map(f => {
      const ok = h[f.key];
      return '<span class="feat-tag '+(f.key==='liverCenter'?(ok?'feat-liver-ok':'feat-ng'):(ok?'feat-ok':'feat-ng'))+'">'+(ok?'✓':'✗')+' '+f.label+'</span>';
    }).join('');
    html += '<div class="hospital-card '+(rankClass[i]||'')+'">';
    html += '<div class="h-header">';
    html += '<div class="h-rank">'+(i+1)+'</div>';
    html += '<div style="flex:1"><div class="h-name">'+esc(h.name)+townBadge+'</div><div style="font-size:0.78rem;color:#718096;margin-top:2px;">'+esc(h.type)+'</div></div>';
    html += '<div class="h-dist">約 '+dist+'</div>';
    html += '</div>';
    html += '<div class="h-body">';
    html += '<div class="item"><span class="label">住所</span><span class="val">'+esc(h.address)+'</span></div>';
    if (h.tel)  html += '<div class="item"><span class="label">電話</span><span class="val"><a href="tel:'+esc(h.tel)+'">'+esc(h.tel)+'</a></span></div>';
    if (h.dept) html += '<div class="item" style="grid-column:1/-1"><span class="label">診療科</span><span class="val">'+esc(h.dept)+'</span></div>';
    if (h.access) html += '<div class="item"><span class="label">交通</span><span class="val">'+esc(h.access)+'</span></div>';
    if (h.url)  html += '<div class="item"><span class="label">URL</span><span class="val"><a href="'+esc(h.url)+'" target="_blank" rel="noopener">'+esc(h.url)+'</a></span></div>';
    if (h.note) html += '<div class="item" style="grid-column:1/-1"><span class="label">備考</span><span class="val">'+esc(h.note)+'</span></div>';
    html += '</div>';
    if (featsHtml) html += '<div class="features">'+featsHtml+'</div>';
    html += '</div>';
  });

  resultsEl.innerHTML = html;
  renderMap(coords, top6);
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let _map = null;
function renderMap(origin, hospitals) {
  const container = document.getElementById('mapContainer');
  container.style.display = 'block';
  if (_map) { _map.remove(); _map = null; }
  const map = L.map('map').setView([origin.lat, origin.lng], 13);
  _map = map;
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
  }).addTo(map);
  const originIcon = L.divIcon({
    className: '',
    html: '<div style="background:#e53e3e;color:white;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:18px;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.4);">📍</div>',
    iconSize: [34,34], iconAnchor: [17,17]
  });
  L.marker([origin.lat, origin.lng], {icon: originIcon}).addTo(map)
    .bindPopup('<b>検索基準地点</b><br>'+esc(origin.resolvedAddress));
  const colors = ['#d69e2e','#a0aec0','#c05621','#2b6cb0','#2b6cb0','#2b6cb0'];
  hospitals.forEach((h, i) => {
    const color = colors[i] || '#2b6cb0';
    const distNum = h.distance < 1 ? Math.round(h.distance*1000)+'m' : h.distance.toFixed(1)+'km';
    const badge = h.sameTown ? '🟡同地区' : h.adjacentTown ? '🟢隣接' : '';
    const icon = L.divIcon({
      className: '',
      html: '<div style="background:'+color+';color:white;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:13px;border:2px solid white;box-shadow:0 2px 5px rgba(0,0,0,0.35);">'+(i+1)+'</div>',
      iconSize: [30,30], iconAnchor: [15,15]
    });
    const popup = '<b>'+(i+1)+'位: '+esc(h.name)+'</b>'+(badge?' '+badge:'')+'<br>'+distNum+'<br><span style="font-size:0.85em;color:#555;">'+esc(h.address)+'</span>';
    L.marker([h.lat, h.lng], {icon}).addTo(map).bindPopup(popup);
  });
  const allPoints = [[origin.lat, origin.lng], ...hospitals.map(h => [h.lat, h.lng])];
  map.fitBounds(L.latLngBounds(allPoints).pad(0.15));
}

let zipLookupTimer = null;
document.getElementById('zipInput').addEventListener('input', function() {
  const z = this.value.replace(/[^\d]/g, '');
  const townEl = document.getElementById('townDisplay');
  const addrRow = document.getElementById('addrRow');
  clearTimeout(zipLookupTimer);
  if (z.length !== 7) { townEl.style.display='none'; addrRow.style.display='none'; return; }
  townEl.textContent = '検索中...';
  townEl.className = 'town-display loading';
  townEl.style.display = 'inline-block';
  addrRow.style.display = 'none';
  zipLookupTimer = setTimeout(async () => {
    try {
      const res = await fetch('https://zipcloud.ibsnet.co.jp/api/search?zipcode='+z);
      const data = await res.json();
      if (!data.results || !data.results.length) {
        townEl.textContent = '郵便番号が見つかりません'; townEl.className = 'town-display error';
      } else {
        const r = data.results[0];
        townEl.textContent = r.address1+r.address2+r.address3;
        townEl.dataset.zip = z;
        townEl.className = 'town-display';
        addrRow.style.display = 'flex';
        document.getElementById('addrInput').focus();
      }
    } catch { townEl.textContent = '取得エラー'; townEl.className = 'town-display error'; }
  }, 400);
});
document.getElementById('zipInput').addEventListener('keydown', e => { if (e.key==='Enter') doSearch(); });
document.getElementById('addrInput').addEventListener('keydown', e => { if (e.key==='Enter') doSearch(); });
</script>
